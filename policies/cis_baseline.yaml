ssh:
  disable_root_login: true
  disable_password_authentication: true
  idle_timeout: 300

firewall:
  enabled: true
  allowed_ports:
    - 22
    - 80
    - 443

fail2ban:
  enabled: true
  bantime: 3600
  maxretry: 5

sysctl:
  ip_forward: 0
  send_redirects: 0
  syn_cookies: 1

auditd:
  enabled: true

password_policy:
  min_length: 12
  password_expiry_days: 90